server {
    listen 80;
    server_name _;

    # Trên Kali: bạn sẽ đặt project vào thư mục này.
    root /var/www/php-auth-app;
    index index.php;

    client_max_body_size 10m;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;

        # Chỉnh đúng sock/php-fpm version trên Kali của bạn.
        # Ví dụ thường gặp: /run/php/php8.2-fpm.sock hoặc /run/php/php8.1-fpm.sock
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }
}

