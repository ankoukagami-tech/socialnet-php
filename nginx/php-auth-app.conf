server {
    listen 80;
    server_name _;

    root /var/www/php-auth-app;
    index index.php;

    client_max_body_size 10m;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;

        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
    }
}

